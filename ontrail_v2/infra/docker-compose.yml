# OnTrail v2 — local infra (Postgres + MailSlurper only)
# Hanko runs directly via start.sh, not in Docker.
# Usage:  docker-compose up -d   (from this directory, or via start.sh)

services:

  # ── Postgres ─────────────────────────────────────────────────────────────
  postgresd:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hanko
      POSTGRES_PASSWORD: hanko
      POSTGRES_DB: hanko
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanko -d hanko"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── MailSlurper — catches all outgoing email ──────────────────────────────
  # Web UI  →  http://localhost:8080
  # REST    →  http://localhost:8085
  # SMTP    →  localhost:2525  (2500 is taken by OrbStack on arm64)
  mailslurper:
    image: marcopas/docker-mailslurper:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8085:8085"
      - "2525:2500"

volumes:
  pg_data:
